<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>えいたろう & UZU クイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 720px; }
    #screen-title { text-align: center; animation: fadeIn 0.8s ease; }
    .logo {
      font-size: 3.5rem; font-weight: 900;
      background: linear-gradient(90deg, #f7971e, #ffd200, #f7971e);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shine 2s linear infinite;
      line-height: 1.1; margin-bottom: 8px;
    }
    .subtitle { color: #c9d1f7; font-size: 1rem; margin-bottom: 32px; letter-spacing: 0.05em; }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 36px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .rules { color: #dde3ff; line-height: 1.8; margin-bottom: 28px; font-size: 0.95rem; }
    .rules li { margin-bottom: 6px; list-style: none; padding-left: 1.5em; position: relative; }
    .rules li::before { content: '▶'; position: absolute; left: 0; color: #ffd200; font-size: 0.75em; top: 0.2em; }
    .pool-info {
      background: rgba(255,210,0,0.1);
      border: 1px solid rgba(255,210,0,0.3);
      border-radius: 10px; padding: 10px 14px;
      color: #ffd200; font-size: 0.85rem; font-weight: 700;
      margin-bottom: 20px; text-align: center;
    }
    .btn-start {
      width: 100%; padding: 18px; border: none; border-radius: 14px;
      font-size: 1.2rem; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e; letter-spacing: 0.05em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(247,151,30,0.4);
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(247,151,30,0.55); }
    .btn-start:active { transform: translateY(0); }
    #screen-quiz { display: none; animation: fadeIn 0.5s ease; }
    .progress-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 99px; height: 8px; margin-bottom: 20px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #f7971e, #ffd200); border-radius: 99px; transition: width 0.4s ease; }
    .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .q-counter { color: #ffd200; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.05em; }
    .score-badge {
      background: rgba(255,210,0,0.15);
      border: 1px solid rgba(255,210,0,0.3);
      color: #ffd200; padding: 4px 14px;
      border-radius: 99px; font-weight: 700; font-size: 0.85rem;
    }
    .question-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 32px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .category-tag {
      display: inline-block;
      background: rgba(247,151,30,0.2);
      border: 1px solid rgba(247,151,30,0.4);
      color: #ffd200; font-size: 0.75rem;
      padding: 3px 10px; border-radius: 99px;
      font-weight: 700; margin-bottom: 16px; letter-spacing: 0.05em;
    }
    .question-text { color: #ffffff; font-size: 1.15rem; font-weight: 700; line-height: 1.6; margin-bottom: 24px; }
    .choices { display: flex; flex-direction: column; gap: 12px; }
    .choice-btn {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 12px; color: #dde3ff;
      font-size: 1rem; padding: 14px 18px;
      text-align: left; cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 12px; line-height: 1.4;
    }
    .choice-label {
      min-width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0; transition: all 0.2s;
    }
    .choice-btn:hover:not(:disabled) { background: rgba(255,255,255,0.12); border-color: rgba(255,210,0,0.5); transform: translateX(4px); }
    .choice-btn:hover:not(:disabled) .choice-label { border-color: #ffd200; color: #ffd200; }
    .choice-btn.correct { background: rgba(52,211,153,0.15); border-color: #34d399; color: #ffffff; }
    .choice-btn.correct .choice-label { background: #34d399; border-color: #34d399; color: #fff; }
    .choice-btn.wrong { background: rgba(239,68,68,0.15); border-color: #ef4444; color: rgba(255,255,255,0.6); }
    .choice-btn.wrong .choice-label { background: #ef4444; border-color: #ef4444; color: #fff; }
    .choice-btn.reveal { background: rgba(52,211,153,0.08); border-color: rgba(52,211,153,0.4); }
    .choice-btn:disabled { cursor: default; }
    .feedback-box { margin-top: 20px; padding: 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; display: none; }
    .feedback-box.show { display: block; animation: slideUp 0.3s ease; }
    .feedback-box.ok { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3); color: #a7f3d0; }
    .feedback-box.ng { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .feedback-icon { font-size: 1.1rem; margin-right: 6px; }
    .btn-next {
      width: 100%; margin-top: 20px; padding: 15px;
      border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; letter-spacing: 0.05em;
      transition: transform 0.15s, box-shadow 0.15s;
      display: none;
      box-shadow: 0 4px 16px rgba(102,126,234,0.4);
    }
    .btn-next.show { display: block; animation: slideUp 0.3s ease; }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(102,126,234,0.5); }
    #screen-result { display: none; text-align: center; animation: fadeIn 0.8s ease; }
    .result-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px; padding: 40px 36px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .trophy { font-size: 5rem; margin-bottom: 12px; animation: bounce 1s ease infinite alternate; }
    .result-title { font-size: 1.6rem; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .result-score {
      font-size: 3.5rem; font-weight: 900;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 16px 0;
    }
    .result-score span { font-size: 1.5rem; color: #c9d1f7; -webkit-text-fill-color: #c9d1f7; }
    .award-banner {
      background: linear-gradient(135deg, rgba(247,151,30,0.2), rgba(255,210,0,0.2));
      border: 2px solid rgba(255,210,0,0.5);
      border-radius: 16px; padding: 20px; margin: 20px 0;
      animation: pulse 2s ease infinite;
    }
    .award-title { font-size: 1.1rem; color: #ffd200; font-weight: 900; letter-spacing: 0.08em; }
    .award-text { color: #ffe7a0; font-size: 0.9rem; margin-top: 6px; line-height: 1.5; }
    .miss-banner {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px; padding: 16px; margin: 20px 0;
    }
    .miss-banner p { color: #c9d1f7; font-size: 0.9rem; line-height: 1.6; }
    .result-msg { color: #c9d1f7; font-size: 0.95rem; line-height: 1.7; margin-bottom: 28px; }
    .btn-retry {
      width: 100%; padding: 16px;
      border: none; border-radius: 14px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a2e; letter-spacing: 0.05em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(247,151,30,0.4);
    }
    .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(247,151,30,0.55); }
    .wrong-list { margin-top: 24px; text-align: left; }
    .wrong-list h3 { color: #ffd200; font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; letter-spacing: 0.05em; }
    .wrong-item {
      background: rgba(255,255,255,0.05);
      border-radius: 10px; padding: 10px 14px;
      margin-bottom: 8px; font-size: 0.82rem;
      color: #c9d1f7; line-height: 1.5;
    }
    .wrong-item .wq { color: #fff; font-weight: 600; margin-bottom: 4px; }
    .wrong-item .wa { color: #34d399; }
    .loading {
      color: #c9d1f7; text-align: center; padding: 40px;
      font-size: 0.95rem;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shine { to { background-position: 200% center; } }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,210,0,0.2); } 50% { box-shadow: 0 0 0 12px rgba(255,210,0,0); } }
  </style>
</head>
<body>
<div class="container">
  <div id="screen-title">
    <div class="logo">えいたろう & UZU<br>クイズ</div>
    <div class="subtitle">平石英太郎 / Sally / マダミスアプリUZU</div>
    <div class="card">
      <div class="pool-info" id="pool-info">📚 問題プール読み込み中...</div>
      <ul class="rules">
        <li>毎回 <strong>20問</strong> をプールからランダム出題（3択形式）</li>
        <li>問題プールは全 <strong>300問</strong>。プレイするたび出題内容が変わる</li>
        <li>平石英太郎の略歴・アクション、UZUの発展、Sally社の成長が出題</li>
        <li><strong>18問以上</strong>正解で🏆 <strong>UZUマスター Award</strong> を獲得！</li>
        <li>各問正解後に解説が表示されます</li>
      </ul>
      <button class="btn-start" id="btn-start" onclick="startQuiz()" disabled>クイズ スタート ▶</button>
    </div>
  </div>
  <div id="screen-quiz">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="meta-row">
      <div class="q-counter" id="q-counter">問題 1 / 20</div>
      <div class="score-badge" id="score-badge">正解 0 問</div>
    </div>
    <div class="question-card">
      <div class="category-tag" id="category-tag">カテゴリ</div>
      <div class="question-text" id="question-text">問題文</div>
      <div class="choices" id="choices"></div>
      <div class="feedback-box" id="feedback-box"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>
  <div id="screen-result">
    <div class="result-card">
      <div class="trophy" id="trophy">🏆</div>
      <div class="result-title" id="result-title">結果発表</div>
      <div class="result-score" id="result-score">0 <span>/ 20問</span></div>
      <div id="award-area"></div>
      <div class="result-msg" id="result-msg"></div>
      <button class="btn-retry" onclick="restartQuiz()">もう一度挑戦する 🔄</button>
      <div class="wrong-list" id="wrong-list"></div>
    </div>
  </div>
</div>

<script>
// えいたろう & UZU クイズ 問題プール（300問）
// 出典：「平石英太郎・株式会社Sally・マダミスアプリUZU 創業(2018年)〜2026年の活動・ニュースまとめ」

const QUESTIONS = [
  /* ===== BATCH 1: 平石英太郎 略歴 + Sally基本情報 (Q1-Q50) ===== */
  { category: "平石英太郎 略歴", q: "平石英太郎が生まれた年はいつか？", choices: ["1996年", "1998年", "2000年"], answer: 1, explanation: "平石英太郎は1998年、京都府生まれ。父親の仕事の関係で1歳から6歳までモスクワで暮らした帰国子女です。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が生まれた都道府県はどこか？", choices: ["東京都", "京都府", "大阪府"], answer: 1, explanation: "1998年、京都府生まれ。父親の仕事の関係で海外と日本を行き来した経歴を持ちます。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が幼少期（1〜6歳）に暮らした都市はどこか？", choices: ["ロンドン", "パリ", "モスクワ"], answer: 2, explanation: "父親の仕事の関係で1歳から6歳までモスクワ（ロシア）で暮らしました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が11歳の頃に1年間滞在した国はどこか？", choices: ["ドイツ", "フランス", "オーストリア"], answer: 2, explanation: "11歳の頃にオーストリアに1年間滞在しています。モスクワでの幼少期と合わせて帰国子女としての経歴を持ちます。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が東京大学に入学した年はいつか？", choices: ["2015年", "2016年", "2017年"], answer: 2, explanation: "2017年、東京大学に推薦入試で入学しました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が東京大学に入学した方法はどれか？", choices: ["一般入試", "推薦入試", "AO入試"], answer: 1, explanation: "推薦入試で入学。「教育」と「笑い」をテーマにした論文で出願しました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が東大入試の論文で扱ったテーマはどれか？", choices: ["「科学と技術」", "「教育と笑い」", "「経済と福祉」"], answer: 1, explanation: "「教育」と「笑い」をテーマにした論文で東京大学に推薦出願しています。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が在籍していた東京大学の学部はどこか？", choices: ["工学部", "教育学部", "経済学部"], answer: 1, explanation: "教育学部に在籍。後に起業に専念するため大学を退学しています。" },
  { category: "平石英太郎 略歴", q: "平石英太郎がスタートアップへの興味を深めるきっかけとなった授業を担当した東大の教員はだれか？", choices: ["馬田隆明氏（FoundX）", "孫泰蔵氏", "前田裕二氏"], answer: 0, explanation: "東大の馬田隆明氏（FoundX）が開講するボードゲーム関連授業がスタートアップへの関心の入口となりました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が学生時代にインターンしたスタートアップとして正しいのはどれか？", choices: ["メルカリ", "株式会社POL", "LINEヤフー"], answer: 1, explanation: "株式会社POL（東京拠点リーダー）と株式会社COMPASSの2社でインターンしています。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が株式会社POLでのインターンで担当した業務はどれか？", choices: ["エンジニアリング・開発", "マーケ・営業・カスタマーサクセス", "デザイン・UX"], answer: 1, explanation: "株式会社POLでは東京拠点リーダーとしてマーケ・営業・カスタマーサクセスを担当しました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎がインターンした「株式会社COMPASS」での担当業務はどれか？", choices: ["アプリ開発", "ワークショップ企画・FC拡大", "海外事業展開"], answer: 1, explanation: "株式会社COMPASSではワークショップ企画やFC（フランチャイズ）拡大を担当しました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎がSallyを創業したのは東京大学何年在学中だったか？", choices: ["1年", "2年", "3年"], answer: 1, explanation: "2018年8月、東大2年在学中に株式会社Sallyを設立しました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎のX（旧Twitter）個人アカウント名はどれか？", choices: ["@eitaro_hiraishi", "@capriccioreiser", "@sally_eitaro"], answer: 1, explanation: "個人Xアカウントは @capriccioreiser。一部記事では「平石レゼ」表記でも紹介されています。" },
  { category: "平石英太郎 略歴", q: "平石英太郎がゲスト出演したSpotifyポッドキャスト「Startup Now」のエピソード番号は？", choices: ["#30前編", "#60前編", "#90前編"], answer: 1, explanation: "「Startup Now」#60前編にゲスト出演しました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎がマダミスを事業テーマに選んだ理由として語ったフレーズはどれか？", choices: ["「儲かると確信したから」", "「泣いたり笑ったり、最も自分のための事業テーマ」", "「競合が少なかったから」"], answer: 1, explanation: "「泣いたり笑ったり、自分にとって最も自分のための事業テーマだと思えたのがマダミスだった」とインタビューで語っています。" },
  { category: "平石英太郎 略歴", q: "Sally創業の契機となったアクセラレータはどれか？", choices: ["Y Combinator", "500 Startups", "Open Network Lab"], answer: 2, explanation: "Open Network Lab（オープンネットワークラボ）のアクセラレータ採択がSally設立の契機となりました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が個人プロフィールを掲載しているカジュアル面談プラットフォームはどれか？", choices: ["Meety", "Pitta", "Yenta"], answer: 1, explanation: "Pittaに「平石英太郎／株式会社Sallyの中の人」としてプロフィールを公開しています。" },
  { category: "平石英太郎 略歴", q: "平石英太郎の個人アカウント @capriccioreiser の別表記として一部記事に登場するのはどれか？", choices: ["平石マサ", "平石レゼ", "平石タロウ"], answer: 1, explanation: "一部記事で「平石レゼ」表記が使われています。" },
  { category: "平石英太郎 略歴", q: "Sallyのビジョンに含まれるキーワードはどれか？", choices: ["「テクノロジーで社会を変える」", "「マダミスの渦」", "「人とつながるゲーム」"], answer: 1, explanation: "Sallyのビジョンは「世界中を体験型エンタメ『マダミス』の渦に巻き込む」です。" },
  { category: "平石英太郎 略歴", q: "平石英太郎が東大で受講していた、スタートアップ興味の入口となった授業のジャンルはどれか？", choices: ["プログラミング関連", "ボードゲーム関連", "投資関連"], answer: 1, explanation: "馬田隆明氏が開講していたボードゲーム関連授業を通じてスタートアップへの興味を深めました。" },
  { category: "平石英太郎 略歴", q: "平石英太郎の生い立ちとして正しいのはどれか？", choices: ["東京生まれ・東京育ち", "京都生まれ・モスクワ経由の帰国子女", "大阪生まれ・アメリカ育ち"], answer: 1, explanation: "1998年京都府生まれ。1〜6歳をモスクワ、11歳でオーストリアに1年間滞在した帰国子女です。" },

</script>
<script>
const QUIZ_LENGTH = 20;
const AWARD_THRESHOLD = 18;
let current = 0, score = 0, answered = false;
let wrongAnswers = [];
let shuffled = [];

function updatePoolInfo() {
  const el = document.getElementById('pool-info');
  const btn = document.getElementById('btn-start');
  if (typeof QUESTIONS === 'undefined') {
    el.textContent = '⚠️ 問題プールが読み込めません';
    return;
  }
  el.innerHTML = `📚 問題プール：<strong>${QUESTIONS.length}問</strong> から毎回20問を抽出`;
  btn.disabled = false;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  if (typeof QUESTIONS === 'undefined' || QUESTIONS.length === 0) return;
  shuffled = shuffle(QUESTIONS).slice(0, QUIZ_LENGTH);
  current = 0; score = 0; wrongAnswers = []; answered = false;
  document.getElementById('screen-title').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-quiz').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = shuffled[current];
  document.getElementById('progress-bar').style.width = ((current / QUIZ_LENGTH) * 100) + '%';
  document.getElementById('q-counter').textContent = `問題 ${current + 1} / ${QUIZ_LENGTH}`;
  document.getElementById('score-badge').textContent = `正解 ${score} 問`;
  document.getElementById('category-tag').textContent = q.category;
  document.getElementById('question-text').textContent = q.q;
  const feedback = document.getElementById('feedback-box');
  feedback.className = 'feedback-box'; feedback.innerHTML = '';
  const btnNext = document.getElementById('btn-next');
  btnNext.className = 'btn-next';
  btnNext.textContent = current + 1 < QUIZ_LENGTH ? '次の問題へ →' : '結果を見る 🎉';
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const labels = ['A', 'B', 'C'];
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${labels[i]}</span><span>${choice}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });
}

function selectAnswer(chosen) {
  if (answered) return;
  answered = true;
  const q = shuffled[current];
  const buttons = document.querySelectorAll('.choice-btn');
  const feedback = document.getElementById('feedback-box');
  buttons.forEach(b => b.disabled = true);
  if (chosen === q.answer) {
    score++;
    buttons[chosen].classList.add('correct');
    feedback.className = 'feedback-box ok show';
    feedback.innerHTML = `<span class="feedback-icon">✅</span><strong>正解！</strong>　${q.explanation}`;
  } else {
    buttons[chosen].classList.add('wrong');
    buttons[q.answer].classList.add('reveal');
    feedback.className = 'feedback-box ng show';
    feedback.innerHTML = `<span class="feedback-icon">❌</span><strong>不正解…</strong>　正解は「${q.choices[q.answer]}」です。${q.explanation}`;
    wrongAnswers.push({ q: q.q, a: q.choices[q.answer] });
  }
  document.getElementById('score-badge').textContent = `正解 ${score} 問`;
  document.getElementById('btn-next').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= QUIZ_LENGTH) showResult();
  else loadQuestion();
}

function showResult() {
  document.getElementById('screen-quiz').style.display = 'none';
  document.getElementById('screen-result').style.display = 'block';
  document.getElementById('result-score').innerHTML = `${score} <span>/ ${QUIZ_LENGTH}問</span>`;
  document.getElementById('progress-bar').style.width = '100%';
  const awardArea = document.getElementById('award-area');
  const trophy = document.getElementById('trophy');
  const resultTitle = document.getElementById('result-title');
  const resultMsg = document.getElementById('result-msg');
  if (score >= AWARD_THRESHOLD) {
    trophy.textContent = '🏆';
    resultTitle.textContent = 'UZUマスター Award 獲得！';
    awardArea.innerHTML = `
      <div class="award-banner">
        <div class="award-title">🥇 UZUマスター Award 🥇</div>
        <div class="award-text">${QUIZ_LENGTH}問中${score}問正解！えいたろう・Sally・UZUのことを知り尽くしたマダミスプラットフォーマー認定。あなたこそがUZUの世界の渦の中心だ！</div>
      </div>`;
    resultMsg.textContent = `${score === QUIZ_LENGTH ? '完璧です！' : 'すばらしい成績です！'}平石英太郎のビジョン「世界中を体験型エンタメ『マダミス』の渦に巻き込む」をあなたは体現しています。`;
  } else if (score >= 14) {
    trophy.textContent = '🥈';
    resultTitle.textContent = 'もう少しで Award！';
    awardArea.innerHTML = `
      <div class="miss-banner">
        <p>🎖️ あと${AWARD_THRESHOLD - score}問で <strong>UZUマスター Award</strong> 獲得！<br>もう一度挑戦してAwardを目指そう！（次回は別の問題が出題されます）</p>
      </div>`;
    resultMsg.textContent = `${score}問正解！UZUへの理解は深まっています。苦手な分野を復習してもう一度チャレンジしてみてください。`;
  } else {
    trophy.textContent = '📖';
    resultTitle.textContent = 'もっと学ぼう！';
    awardArea.innerHTML = `
      <div class="miss-banner">
        <p>📚 UZUマスター Awardまであと<strong>${AWARD_THRESHOLD - score}問</strong>！<br>平石英太郎・Sally・UZUをもっと学んで再挑戦しよう！</p>
      </div>`;
    resultMsg.textContent = `${score}問正解でした。マダミスアプリ「UZU」の世界はまだまだ広い！もう一度挑戦してAwardを目指そう。`;
  }
  if (wrongAnswers.length > 0) {
    const wrongListEl = document.getElementById('wrong-list');
    wrongListEl.innerHTML = `<h3>📌 間違えた問題の復習（${wrongAnswers.length}問）</h3>`;
    wrongAnswers.forEach(item => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      div.innerHTML = `<div class="wq">Q. ${item.q}</div><div class="wa">✅ 正解：${item.a}</div>`;
      wrongListEl.appendChild(div);
    });
  }
}

function restartQuiz() {
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-title').style.display = 'block';
}

window.addEventListener('load', updatePoolInfo);
</script>
